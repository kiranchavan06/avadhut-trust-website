<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>कार्यक्रम - अवधूत चिंतन गोशाळा</title>
<link rel="stylesheet" href="style.css" />
<style>
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  padding: 2rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}
.event-card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: transform 0.2s;
}
.event-card:hover { transform: translateY(-4px); }
.event-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #FFF3E0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
}
.event-img img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}
.event-info { padding: 1rem; }
.event-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 0.5rem; }
.event-date { font-size: 0.9rem; color: #FF6F00; font-weight: 600; margin-bottom: 0.3rem; }
.event-location { font-size: 0.85rem; color: #666; margin-bottom: 0.3rem; }
.event-time { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
.event-desc { font-size: 0.85rem; color: #666; margin-bottom: 0.75rem; }
.event-type {
  background: #FFF3E0;
  color: #FF6F00;
  font-size: 0.75rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  display: inline-block;
  font-weight: 600;
}
.loading { text-align: center; padding: 3rem; color: #999; font-size: 1.1rem; }
.page-title {
  text-align: center;
  padding: 2rem 1rem 0.5rem;
  font-size: 1.8rem;
  font-weight: 800;
  color: #FF6F00;
}
.no-events {
  text-align: center;
  padding: 3rem;
  color: #999;
  grid-column: 1/-1;
}
</style>
</head>
<body>
<nav>
<div class="nav-inner">
<a href="index.html" class="nav-logo">🪔 अवधूत चिंतन गोशाळा</a>
<ul class="nav-links" id="navLinks">
<li><a href="index.html">मुख्यपृष्ठ</a></li>
<li><a href="events.html" class="active">कार्यक्रम</a></li>
<li><a href="products.html">उत्पादने</a></li>
<li><a href="reviews.html">अभिप्राय</a></li>
<li><a href="admin.html">Admin</a></li>
</ul>
<button class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
</div>
</nav>

<h1 class="page-title">📅 आमचे कार्यक्रम</h1>

<div id="eventsContainer" class="events-grid">
  <div class="loading">⏳ कार्यक्रम लोड होत आहेत...</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm7G8W2EM2B9nNvujP8SQQht7HHkQYqLA",
  authDomain: "avadhut-trust.firebaseapp.com",
  projectId: "avadhut-trust",
  storageBucket: "avadhut-trust.firebasestorage.app",
  messagingSenderId: "291155545994",
  appId: "1:291155545994:web:2aaf2ad05bc1c716630273"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

async function loadEvents() {
  const container = document.getElementById('eventsContainer');

  try {
    const snap = await getDocs(collection(db, 'events'));

    if (snap.empty) {
      container.innerHTML = '<div class="no-events">📅 सध्या कोणतेही कार्यक्रम नाहीत.</div>';
      return;
    }

    let events = [];
    snap.forEach(d => events.push({ id: d.id, ...d.data() }));

    // Sort by date
    events.sort((a, b) => new Date(a.date) - new Date(b.date));

    container.innerHTML = events.map(e => `
      <div class="event-card">
        <div class="event-img">
          ${e.image ? `<img src="${e.image}" alt="${e.title}" />` : '📅'}
        </div>
        <div class="event-info">
          <span class="event-type">${e.type || 'कार्यक्रम'}</span>
          <div class="event-title">${e.title}</div>
          <div class="event-date">📆 ${formatDate(e.date)}</div>
          <div class="event-time">🕐 ${e.time || ''}</div>
          <div class="event-location">📍 ${e.location || ''}</div>
          <div class="event-desc">${e.desc || ''}</div>
        </div>
      </div>
    `).join('');

  } catch (err) {
    container.innerHTML = '<div class="loading">❌ Error: ' + err.message + '</div>';
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('mr-IN', { 
    day: 'numeric', 
    month: 'long', 
    year: 'numeric' 
  });
}

loadEvents();
</script>
</body>
</html>
