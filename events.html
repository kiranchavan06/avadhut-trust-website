<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>कार्यक्रम - अवधूत चिंतन गोशाळा</title>
<link rel="stylesheet" href="style.css" />

<style>
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  padding: 2rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}
.event-card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
}
.event-img {
  width: 100%;
  height: 180px;
  background: #FFF3E0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
}
.event-img img { width: 100%; height: 180px; object-fit: cover; }
.event-info { padding: 1rem; }
.event-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 0.5rem; }
.event-date { font-size: 0.9rem; color: #FF6F00; font-weight: 600; margin-bottom: 0.3rem; }
.event-location { font-size: 0.85rem; color: #666; margin-bottom: 0.3rem; }
.event-time { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
.event-desc { font-size: 0.85rem; color: #666; margin-bottom: 0.75rem; }

.btn-register {
  width: 100%;
  padding: 0.6rem;
  border: none;
  border-radius: 8px;
  background: #FF6F00;
  color: white;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 0.5rem;
}
.btn-register:disabled { background: #ccc; cursor: not-allowed; }
.btn-register.full { background: #C62828; }

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 12px;
  padding: 1.5rem;
  width: 90%;
  max-width: 400px;
}
.modal-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
.btn-confirm {
  flex: 1; padding: 0.6rem;
  background: #FF6F00; color: white;
  border: none; border-radius: 8px;
}
.btn-cancel {
  flex: 1; padding: 0.6rem;
  background: #eee; border: none;
}
.loading { text-align: center; padding: 3rem; color: #999; }
#toast { position: fixed; bottom: 2rem; right: 2rem; background: #333; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; display: none; z-index: 999; }

.page-hero {
  background: linear-gradient(135deg, #fd9d5e, #fb9f5e);
  color: white;
  text-align: center;
  padding: 3rem 1rem 2.5rem;
}
.page-hero h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 900; margin-bottom: 0.5rem; }
.page-hero p { opacity: 0.9; font-size: 1rem; }
#toast { position: fixed; bottom: 2rem; right: 2rem; background: #333; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; display: none; z-index: 999; }

</style>
</head>

<body>
  <!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🪔 <span>अवधूत चिंतन गोशाळा निर्मित प्रॉडक्ट</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" >मुख्यपृष्ठ</a></li>
      <li><a href="events.html" class="active">कार्यक्रम</a></li>
      <li><a href="products.html">उत्पादने</a></li>
      <li><a href="active.html">सदस्य</a></li>
      <li><a href="reviews.html">अभिप्राय</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
    <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="page-hero">
  <h1>आमचे कार्यक्रम</h1>
  <p>अवधूत चिंतन गोशाळेचे कार्यक्रम</p>
</div>

<div id="eventsContainer" class="events-grid">
  <div class="loading">⏳ कार्यक्रम लोड होत आहेत...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="regModal">
  <div class="modal">
    <h3>📝 नोंदणी करा</h3>
    <p id="modalEventName"></p>

    <input type="text" id="regName" placeholder="नाव" />
    <input type="tel" id="regPhone" placeholder="फोन" />
    <input type="text" id="regCity" placeholder="शहर" />

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">रद्द</button>
      <button class="btn-confirm" onclick="confirmRegister()">नोंदणी</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm7G8W2EM2B9nNvujP8SQQht7HHkQYqLA",
  authDomain: "avadhut-trust.firebaseapp.com",
  projectId: "avadhut-trust",
  storageBucket: "avadhut-trust.firebasestorage.app",
  messagingSenderId: "291155545994",
  appId: "1:291155545994:web:2aaf2ad05bc1c716630273"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentEventId = "";
let currentEventName = "";

/* 🔥 NEW: DATE CHECK */
function isEventPast(dateStr) {
  if (!dateStr) return false;

  const today = new Date();
  const eventDate = new Date(dateStr);

  today.setHours(0,0,0,0);
  eventDate.setHours(0,0,0,0);

  return eventDate < today;
}

/* LOAD EVENTS */
async function loadEvents() {
  const container = document.getElementById('eventsContainer');

  const snap = await getDocs(collection(db, 'events'));

  if (snap.empty) {
    container.innerHTML = "No events";
    return;
  }

  let events = [];
  snap.forEach(d => events.push({ id: d.id, ...d.data() }));

  events.sort((a,b) => new Date(a.date) - new Date(b.date));

  container.innerHTML = events.map(e => {

    const totalSeats = e.seats || 0;
    const registeredSeats = e.registeredSeats || 0;
    const availableSeats = totalSeats - registeredSeats;

    const isFull = totalSeats > 0 && availableSeats <= 0;
    const isPast = isEventPast(e.date);
    const hasSeats = totalSeats > 0;
    const percent = hasSeats ? Math.min((registeredSeats / totalSeats) * 100, 100) : 0;

    return `
      <div class="event-card">
        <div class="event-img">
          ${e.image ? `<img src="${e.image}">` : "📅"}
        </div>

        <div class="event-info">
          <div class="event-title">${e.title}</div>
          <div class="event-date">📆 ${e.date}</div>
          <div class="event-time">${e.time || ""}</div>
          <div class="event-location">${e.location || ""}</div>
          <div class="event-desc">${e.desc || ""}</div>

          <button class="btn-register ${(isFull || isPast) ? 'full' : ''}"
            ${(isFull || isPast) ? "disabled" : `onclick="openModal('${e.id}','${e.title}')"`}>

            ${isPast ? "⛔ वेळ संपली" : isFull ? "🔴 बंद" : "📝 नोंदणी करा"}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

/* MODAL */
window.openModal = (id,name) => {
  currentEventId = id;
  currentEventName = name;
  document.getElementById('regModal').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('regModal').classList.remove('open');
};

/* BOOKING */
window.confirmRegister = async () => {
  const name = regName.value;
  const phone = regPhone.value;
  const city = regCity.value;

  await addDoc(collection(db,"registrations"),{
    eventId: currentEventId,
    eventName: currentEventName,
    name, phone, city,
    createdAt: new Date()
  });

  await updateDoc(doc(db,"events",currentEventId),{
    registeredSeats: increment(1)
  });

  closeModal();
  loadEvents();
};

loadEvents();
</script>

</body>
</html>
