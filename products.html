<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>उत्पादने - अवधूत चिंतन गोशाळा</title>
<link rel="stylesheet" href="style.css" />
<style>
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.5rem;
  padding: 2rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}
.product-card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: transform 0.2s;
}
.product-card:hover { transform: translateY(-4px); }
.product-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: #FFF3E0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
}
.product-img img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}
.product-info { padding: 1rem; }
.product-name { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 0.3rem; }
.product-category { font-size: 0.8rem; color: #FF6F00; font-weight: 600; margin-bottom: 0.5rem; }
.product-desc { font-size: 0.85rem; color: #666; margin-bottom: 0.75rem; }
.product-price { font-size: 1.2rem; font-weight: 800; color: #FF6F00; }
.product-mrp { font-size: 0.85rem; color: #999; text-decoration: line-through; margin-left: 0.5rem; }
.product-weight { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
.btn-buy {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: #25D366;
  color: white;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.9rem;
  margin-top: 0.75rem;
  width: 100%;
  justify-content: center;
}
.bestseller-badge {
  background: #FF6F00;
  color: white;
  font-size: 0.75rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  margin-bottom: 0.5rem;
  display: inline-block;
}
.filter-bar {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  padding: 1rem;
  max-width: 1200px;
  margin: 0 auto;
}
.filter-btn {
  padding: 0.4rem 1rem;
  border: 2px solid #FF6F00;
  border-radius: 20px;
  background: white;
  color: #FF6F00;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.85rem;
}
.filter-btn.active { background: #FF6F00; color: white; }
.loading { text-align: center; padding: 3rem; color: #999; font-size: 1.1rem; }
.page-title {
  text-align: center;
  padding: 2rem 1rem 0.5rem;
  font-size: 1.8rem;
  font-weight: 800;
  color: #FF6F00;
}
</style>
</head>
<body>
<nav>
<div class="nav-inner">
<a href="index.html" class="nav-logo">🪔 अवधूत चिंतन गोशाळा</a>
<ul class="nav-links" id="navLinks">
<li><a href="index.html">मुख्यपृष्ठ</a></li>
<li><a href="events.html">कार्यक्रम</a></li>
<li><a href="products.html" class="active">उत्पादने</a></li>
<li><a href="active.html" class="active">सदस्य</a></li>
<li><a href="reviews.html">अभिप्राय</a></li>
<li><a href="admin.html">Admin</a></li>
</ul>
<button class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
</div>
</nav>

<h1 class="page-title">🛍️ आमची उत्पादने</h1>

<div class="filter-bar" id="filterBar">
<button class="filter-btn active" onclick="filterProducts('all', this)">सर्व</button>
</div>

<div id="productsContainer" class="products-grid">
<div class="loading">⏳ उत्पादने लोड होत आहेत...</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm7G8W2EM2B9nNvujP8SQQht7HHkQYqLA",
  authDomain: "avadhut-trust.firebaseapp.com",
  projectId: "avadhut-trust",
  storageBucket: "avadhut-trust.firebasestorage.app",
  messagingSenderId: "291155545994",
  appId: "1:291155545994:web:2aaf2ad05bc1c716630273"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

let allProducts = [];
let categories = new Set();

async function loadProducts() {
  const container = document.getElementById('productsContainer');
  const filterBar = document.getElementById('filterBar');
  
  try {
    const snap = await getDocs(collection(db, 'products'));
    
    if (snap.empty) {
      container.innerHTML = '<div class="loading">कोणतेही उत्पादन नाही.</div>';
      return;
    }

    allProducts = [];
    snap.forEach(d => {
      allProducts.push({ id: d.id, ...d.data() });
      if (d.data().category) categories.add(d.data().category);
    });

    // Add category filters
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.onclick = () => filterProducts(cat, btn);
      filterBar.appendChild(btn);
    });

    displayProducts(allProducts);
  } catch (err) {
    container.innerHTML = '<div class="loading">❌ Error: ' + err.message + '</div>';
  }
}

function displayProducts(products) {
  const container = document.getElementById('productsContainer');
  
  if (products.length === 0) {
    container.innerHTML = '<div class="loading">कोणतेही उत्पादन नाही.</div>';
    return;
  }

  container.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : '📦'}
      </div>
      <div class="product-info">
        ${p.bestseller ? '<span class="bestseller-badge">⭐ बेस्टसेलर</span>' : ''}
        <div class="product-name">${p.name}</div>
        <div class="product-category">${p.category || ''}</div>
        <div class="product-desc">${p.desc || ''}</div>
        <div class="product-weight">⚖️ ${p.weight || ''}</div>
        <div>
          <span class="product-price">₹${p.price}</span>
          ${p.mrp ? `<span class="product-mrp">₹${p.mrp}</span>` : ''}
        </div>
        <a href="https://wa.me/xxxxxxxxxx?text=मला%20${encodeURIComponent(p.name)}%20खरेदी%20करायचे%20आहे" 
           class="btn-buy" target="_blank">
          📱 WhatsApp वर खरेदी करा
        </a>
      </div>
    </div>
  `).join('');
}

window.filterProducts = (category, btn) => {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  if (category === 'all') {
    displayProducts(allProducts);
  } else {
    displayProducts(allProducts.filter(p => p.category === category));
  }
};

loadProducts();
</script>
</body>
</html>
