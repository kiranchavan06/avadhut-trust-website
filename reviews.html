<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>अभिप्राय - अवधूत चिंतन गोशाळा</title>
<link rel="stylesheet" href="style.css" />
<style>
.reviews-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
.review-form-card {
  background: white;
  border-radius: 12px;
  padding: 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-bottom: 2rem;
}
.form-row { margin-bottom: 1rem; }
.form-row label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #333; }
.form-row input, .form-row textarea, .form-row select {
  width: 100%;
  padding: 0.6rem;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: inherit;
}
.form-row textarea { height: 100px; resize: vertical; }
.btn-saffron {
  background: #FF6F00;
  color: white;
  border: none;
  padding: 0.7rem 1.5rem;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  width: 100%;
}
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
}
.review-card {
  background: white;
  border-radius: 12px;
  padding: 1.25rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.review-stars { color: #FF6F00; font-size: 1.1rem; margin-bottom: 0.5rem; }
.review-text { font-size: 0.9rem; color: #555; margin-bottom: 0.75rem; font-style: italic; }
.review-name { font-weight: 700; color: #333; font-size: 0.95rem; }
.review-city { font-size: 0.8rem; color: #999; }
.review-product { font-size: 0.8rem; color: #FF6F00; margin-top: 0.3rem; }

.section-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: #FF6F00;
  margin-bottom: 1.5rem;
  text-align: center;
}
.loading { text-align: center; padding: 2rem; color: #999; }
.star-select { display: flex; gap: 0.5rem; font-size: 1.5rem; cursor: pointer; }
.star-select span { cursor: pointer; color: #ddd; }
.star-select span.active { color: #FF6F00; }
#toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: #333;
  color: white;
  padding: 0.8rem 1.5rem;
  border-radius: 8px;
  display: none;
  z-index: 999;
}
.page-hero {
  background: linear-gradient(135deg, #E05A00, #FF8C3A);
  color: white;
  text-align: center;
  padding: 3rem 1rem 2.5rem;
}
.page-hero h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 900; margin-bottom: 0.5rem; }
.page-hero p { opacity: 0.9; font-size: 1rem; }
#toast { position: fixed; bottom: 2rem; right: 2rem; background: #333; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; display: none; z-index: 999; }

</style>
</head>
<body>
<nav>
<div class="nav-inner">
<a href="index.html" class="nav-logo">🪔 अवधूत चिंतन गोशाळा</a>
<ul class="nav-links" id="navLinks">
<li><a href="index.html">मुख्यपृष्ठ</a></li>
<li><a href="events.html">कार्यक्रम</a></li>
<li><a href="products.html">उत्पादने</a></li>
<li><a href="active.html">सदस्य</a></li>
<li><a href="reviews.html" class="active">अभिप्राय</a></li>
<li><a href="admin.html">Admin</a></li>
</ul>
<button class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
</div>
</nav>

<div class="page-hero">
  <h1>अभिप्राय</h1>
</div>


<div class="reviews-wrap">
<!-- Review Form -->
<div class="review-form-card">
<h3 style="color:#FF6F00; margin-bottom:1rem;">✍️ आपला अभिप्राय द्या</h3>
<div class="form-row">
  <label>रेटिंग *</label>
  <div class="star-select" id="starSelect">
    <span onclick="setRating(1)">★</span>
    <span onclick="setRating(2)">★</span>
    <span onclick="setRating(3)">★</span>
    <span onclick="setRating(4)">★</span>
    <span onclick="setRating(5)">★</span>
  </div>
</div>
<div class="form-row"><label>नाव *</label><input type="text" id="rName" placeholder="तुमचे नाव" /></div>
<div class="form-row"><label>शहर</label><input type="text" id="rCity" placeholder="तुमचे शहर" /></div>
<div class="form-row"><label>उत्पादन</label><input type="text" id="rProduct" placeholder="कोणते उत्पादन वापरले?" /></div>
<div class="form-row"><label>अभिप्राय *</label><textarea id="rText" placeholder="तुमचा अनुभव लिहा..."></textarea></div>
<button class="btn-saffron" onclick="submitReview()">💾 अभिप्राय सादर करा</button>
</div>

<!-- Reviews List -->
<h2 class="section-title">सर्व अभिप्राय</h2>
<div id="reviewsContainer" class="reviews-grid">
<div class="loading">⏳ अभिप्राय लोड होत आहेत...</div>
</div>
</div>
<div id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm7G8W2EM2B9nNvujP8SQQht7HHkQYqLA",
  authDomain: "avadhut-trust.firebaseapp.com",
  projectId: "avadhut-trust",
  storageBucket: "avadhut-trust.firebasestorage.app",
  messagingSenderId: "291155545994",
  appId: "1:291155545994:web:2aaf2ad05bc1c716630273"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

let selectedRating = 0;

window.setRating = (rating) => {
  selectedRating = rating;
  const stars = document.querySelectorAll('#starSelect span');
  stars.forEach((s, i) => {
    s.classList.toggle('active', i < rating);
  });
};

window.submitReview = async () => {
  const name = document.getElementById('rName').value.trim();
  const text = document.getElementById('rText').value.trim();

  if (!name || !text || selectedRating === 0) {
    alert('नाव, अभिप्राय आणि रेटिंग आवश्यक आहे!');
    return;
  }

  try {
    await addDoc(collection(db, 'reviews'), {
      name,
      city: document.getElementById('rCity').value.trim(),
      product: document.getElementById('rProduct').value.trim(),
      text,
      rating: selectedRating,
      date: new Date().toLocaleDateString('mr-IN'),
      createdAt: new Date()
    });

    showToast('✅ अभिप्राय सादर झाला! धन्यवाद!');
    document.getElementById('rName').value = '';
    document.getElementById('rCity').value = '';
    document.getElementById('rProduct').value = '';
    document.getElementById('rText').value = '';
    selectedRating = 0;
    document.querySelectorAll('#starSelect span').forEach(s => s.classList.remove('active'));
    loadReviews();
  } catch (err) {
    alert('Error: ' + err.message);
  }
};

async function loadReviews() {
  const container = document.getElementById('reviewsContainer');

  try {
    const q = query(collection(db, 'reviews'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);

    if (snap.empty) {
      container.innerHTML = '<div class="loading">अजून कोणतेही अभिप्राय नाहीत.</div>';
      return;
    }

    let html = '';
    snap.forEach(d => {
      const r = d.data();
      html += `
        <div class="review-card">
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
          <div class="review-text">"${r.text}"</div>
          <div class="review-name">${r.name}</div>
          <div class="review-city">📍 ${r.city || ''}</div>
          <div class="review-product">🛍️ ${r.product || ''}</div>
        </div>`;
    });

    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div class="loading">❌ Error: ' + err.message + '</div>';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

loadReviews();
</script>
</body>
</html>
